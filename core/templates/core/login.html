{% load static %}

<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>ورود به سیستم</title>

    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>

<div class="login-container">

    <div class="login-box">
        <div class="brand-wrapper">
            <h1 class="brand-title">حاما <span>پارچه</span></h1>
            <p class="brand-subtitle">سامانه یکپارچه مدیریت کارخانجات پارچه</p>
        </div>
        <h2 class="title">ورود به حساب کاربری</h2>

        <form method="post" autocomplete="off">
            {% csrf_token %}

            <div class="form-group">
                {{ form.username.label_tag }}
                {{ form.username }}
            </div>

            <div class="form-group">
                {{ form.password.label_tag }}
                {{ form.password }}
            </div>

            <button type="submit" class="btn-login">ورود</button>
        </form>
    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Disable autocomplete on the form and all its input fields
        document.querySelectorAll('form').forEach(form => form.setAttribute('autocomplete', 'off'));
        document.querySelectorAll('input').forEach(input => input.setAttribute('autocomplete', 'off'));
    });
</script>

</body>
</html>
